<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=/web/base/index.html">
    <title>页面跳转中...</title>
    <script>
        // JavaScript 备用跳转，避免 meta 失效的情况
        window.location.replace("/web/base/index.html");
    </script>
</head>
<body>
    <!-- 极少数浏览器禁用脚本和 meta 刷新时的提示 -->
    <p>如果页面未自动跳转，请<a href="/web/base/index.html">点击这里</a>。</p>
</body>
</html>
